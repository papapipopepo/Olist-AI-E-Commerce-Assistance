version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: olist-api
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - QDRANT_COLLECTION_PRODUCTS=${QDRANT_COLLECTION_PRODUCTS:-olist_products}
      - QDRANT_COLLECTION_REVIEWS=${QDRANT_COLLECTION_REVIEWS:-olist_reviews}
      - SQLITE_DB_PATH=/app/database/olist.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-5}
      - DEBUG=false
    volumes:
      - ./database:/app/database   # mount SQLite DB
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit Frontend ───────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: olist-streamlit
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
